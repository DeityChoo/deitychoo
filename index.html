<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Благотворительный фонд</title>
    <script src="https://widget.cloudpayments.ru/bundles/cloudpayments.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            max-width: 520px;
            width: 100%;
            background: #fff;
            border-radius: 24px;
            padding: 36px 32px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.05);
        }
        h1 {
            font-size: 24px;
            font-weight: 600;
            color: #0b1a33;
            margin-bottom: 6px;
        }
        .sub {
            color: #5b6f87;
            font-size: 14px;
            margin-bottom: 24px;
            padding-left: 12px;
            border-left: 3px solid #2a7de1;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #1e2a44;
            margin-bottom: 4px;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            font-size: 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            background: #fafcff;
            font-family: inherit;
            transition: 0.15s;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #2a7de1;
            outline: none;
            box-shadow: 0 0 0 3px rgba(42,125,225,0.1);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }
        .row-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
        }
        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0 24px;
            padding: 10px 16px;
            background: #f2f6fd;
            border-radius: 16px;
        }
        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #2a7de1;
            cursor: pointer;
        }
        .checkbox-group label {
            font-size: 14px;
            font-weight: 500;
            color: #0b1a33;
            cursor: pointer;
        }
        .btn-pay {
            width: 100%;
            padding: 14px;
            background: #2a7de1;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 4px 12px rgba(42,125,225,0.25);
        }
        .btn-pay:hover {
            background: #1e66c2;
            transform: scale(1.01);
        }
        .footnote {
            margin-top: 16px;
            font-size: 12px;
            color: #7b8aa0;
            text-align: center;
        }
        @media (max-width: 480px) {
            .card { padding: 24px 16px; }
            .row-3 { grid-template-columns: 1fr; gap: 0; }
            .row-2 { grid-template-columns: 1fr; gap: 0; }
        }
    </style>
</head>
<body>

<div class="card">
    <h1>❤️ Пожертвование</h1>
    <div class="sub">Все средства пойдут на помощь детям</div>

    <form id="donationForm">
        <div class="row-3">
            <div class="form-group">
                <label for="lastName">Фамилия</label>
                <input type="text" id="lastName" placeholder="Иванов" required>
            </div>
            <div class="form-group">
                <label for="firstName">Имя</label>
                <input type="text" id="firstName" placeholder="Иван" required>
            </div>
            <div class="form-group">
                <label for="middleName">Отчество</label>
                <input type="text" id="middleName" placeholder="Иванович">
            </div>
        </div>

        <div class="row-2">
            <div class="form-group">
                <label for="email">E‑mail</label>
                <input type="email" id="email" placeholder="ivan@mail.ru" required>
            </div>
            <div class="form-group">
                <label for="phone">Телефон</label>
                <input type="tel" id="phone" placeholder="+7 999 123 45 67" required>
            </div>
        </div>

        <div class="form-group">
            <label for="amount">Сумма (₽)</label>
            <input type="number" id="amount" value="500" min="100" required>
        </div>

        <div class="form-group">
            <label for="comment">Комментарий</label>
            <textarea id="comment" placeholder="Ваше пожелание..."></textarea>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="recurrentCheck">
            <label for="recurrentCheck">🔁 Сделать платеж ежемесячным</label>
        </div>

        <button type="button" class="btn-pay" onclick="startPayment()">💳 Оплатить</button>
        <div class="footnote">Безопасный платёж через CloudPayments</div>
    </form>
</div>

<script>
    function startPayment() {
        const amount = parseFloat(document.getElementById('amount').value);
        if (!amount || amount < 100) {
            alert("Введите сумму не менее 100 ₽");
            return;
        }

        const isMonthly = document.getElementById('recurrentCheck').checked;
        const email = document.getElementById('email').value.trim();
        const lastName = document.getElementById('lastName').value.trim();
        const firstName = document.getElementById('firstName').value.trim();
        const middleName = document.getElementById('middleName').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const comment = document.getElementById('comment').value.trim();

        // ----- Формируем описание -----
        const description = isMonthly
            ? `Ежемесячное пожертвование — ${amount} ₽`
            : `Единоразовое пожертвование — ${amount} ₽`;

        // ----- Создаём виджет -----
        const widget = new cp.CloudPayments();

        // ----- Параметры (как в рабочем примере «Три Кота») -----
        const options = {
            publicId: 'pk_3a0775a4af22d745f53ed7774a73d', // Ваш Public ID
            description: description,
            amount: amount,
            currency: 'RUB',
            invoiceId: 'FOND-123', // можно заменить на что-то уникальное
            email: email,
            skin: "modern",
            data: {
                lastName: lastName,
                firstName: firstName,
                middleName: middleName,
                phone: phone,
                comment: comment,       
                fund: 'children-help'
            }
        };

        if (isMonthly) {
            options.accountId = email;
            options.data.cloudPayments = {
                recurrent: { interval: 'Month', period: 1 }
            };
        }
        widget.pay('charge', options, {
            onSuccess: function () {
                alert("Спасибо! Пожертвование прошло успешно ❤️");
            },
            onFail: function () {
                alert("Виджет с оплатой был закрыт. Пожалуйста, повторите попытку ещё раз.");
            }
        });
    }
</script>

</body>
</html>
