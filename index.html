<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Фонд «Три Кота»</title>
    <script src="https://widget.cloudpayments.ru/bundles/cloudpayments.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8f4ed;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        input, textarea, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            background: #ff8c42;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="cats.jpg" alt="Котики">
        <h2 style="text-align:center;">Пожертвование в фонд «Три Кота»</h2>
        <form id="donationForm">
            <input type="text" id="lastName" placeholder="Фамилия" required>
            <input type="text" id="firstName" placeholder="Имя" required>
            <input type="text" id="middleName" placeholder="Отчество">
            <input type="email" id="email" placeholder="Email" required>
            <input type="tel" id="phone" placeholder="Телефон (формат 89999999999)" required>
            <input type="number" id="amount" value="444" min="100" placeholder="Сумма (₽)" required>
            <textarea id="comment" rows="3" placeholder="Комментарий (необязательно)"></textarea>
            <label>
                <input type="checkbox" id="monthlyCheck" checked> Сделать ежемесячным
            </label>
            <button type="button" onclick="startPayment()">Сделать пожертвование</button>
        </form>
    </div>

    <script>
        function startPayment() {
            const amount = parseFloat(document.getElementById('amount').value);
            if (!amount || amount < 100) {
                alert("Введите сумму не менее 100 ₽");
                return;
            }

            const isMonthly = document.getElementById('monthlyCheck').checked;
            const email = document.getElementById('email').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const firstName = document.getElementById('firstName').value.trim();
            const middleName = document.getElementById('middleName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const comment = document.getElementById('comment').value.trim();

            const description = isMonthly
                ? `Ежемесячное пожертвование — ${amount} ₽`
                : `Единоразовое пожертвование — ${amount} ₽`;

            const widget = new cp.CloudPayments();

            // Параметры виджета (строго по документации)
            const intentParams = {
                publicTerminalId: 'pk_774378acb9906498bfe828d52a0c9', // Ваш Public ID
                amount: amount,
                currency: 'RUB',
                paymentSchema: 'Single',
                description: description,
                culture: 'ru-RU',
                skin: 'modern',
                successRedirectUrl: window.location.href + '?success',
                failRedirectUrl: window.location.href + '?fail',
                receiptEmail: email,

                // !!! КЛЮЧЕВОЙ МОМЕНТ: все пользовательские данные передаём через `data`
                // Это поле гарантированно попадает в выгрузку ЛК в колонку «Данные»
                data: {
                    lastName: lastName,
                    firstName: firstName,
                    middleName: middleName,
                    phone: phone,
                    comment: comment,
                    fund: 'tri-kota'
                },

                userInfo: {
                    firstName: firstName,
                    lastName: lastName,
                    middleName: middleName,
                    fullName: [lastName, firstName, middleName].filter(Boolean).join(' '),
                    email: email,
                    phone: phone,
                    accountId: email   // обязательно для рекуррента
                }
            };

            // Если выбран ежемесячный платёж – добавляем рекуррент (по документации)
            if (isMonthly) {
                intentParams.recurrent = {
                    interval: 'Month',
                    period: 1,
                    amount: amount
                };
            }

            // Обработчик закрытия виджета (oncomplete)
            widget.oncomplete = function(result) {
                console.log('Виджет закрыт, результат:', result);
                if (result && result.status === 'success') {
                    alert('Спасибо! Пожертвование прошло успешно ❤️');
                } else if (result && result.status === 'fail') {
                    alert('Платёж не удался: ' + (result.message || 'ошибка'));
                } else if (result && result.type === 'cancel') {
                    console.log('Платёж отменён пользователем');
                }
            };

            // Запуск виджета
            widget.start(intentParams)
                .then(function(widgetResult) {
                    console.log('Promise успех:', widgetResult);
                })
                .catch(function(error) {
                    console.error('Ошибка при запуске виджета:', error);
                    alert('Ошибка запуска виджета. Проверьте консоль (F12).');
                });
        }
    </script>
</body>
</html>
